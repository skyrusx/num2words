                      "otuzuncu", "otuz birinci"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"]
        nominative: ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["saat", "saat", "saat"]
        minute: ["dakika", "dakika", "dakika"]
        second: ["saniye", "saniye", "saniye"]

    warnings:
      currency_not_available: "%{currency} para birimi %{lang} dili için mevcut değil, geçerli olan kullanılıyor."

