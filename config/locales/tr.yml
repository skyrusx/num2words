      - ["milyon", "milyon", "milyon"]
      - ["milyar", "milyar", "milyar"]
      - ["trilyon", "trilyon", "trilyon"]

    grammar:
      minus: "eksi"
      conjunction: "tam"
      default_fraction: "parça"
    fractions:
      10: ["onda bir", "onda bir", "onda bir"]
      100: ["yüzde bir", "yüzde bir", "yüzde bir"]
      1000: ["binde bir", "binde bir", "binde bir"]
      10000: ["on binde bir", "on binde bir", "on binde bir"]
      100000: ["yüz binde bir", "yüz binde bir", "yüz binde bir"]
