        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["stunda", "stundas", "stundu"]
        minute: ["minūte", "minūtes", "minūšu"]
        second: ["sekunde", "sekundes", "sekunžu"]

    warnings:
