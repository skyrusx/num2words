    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["janvāris", "februāris", "marts", "aprīlis", "maijs", "jūnijs", "jūlijs", "augusts", "septembris", "oktobris", "novembris", "decembris"]
