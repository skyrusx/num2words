zh:
  num2words:
    ones_masc: ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"]
    ones_fem: ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"]
    teens: ["十", "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九"]
    tens: ["", "十", "二十", "三十", "四十", "五十", "六十", "七十", "八十", "九十"]
    hundreds: ["", "一百", "二百", "三百", "四百", "五百", "六百", "七百", "八百", "九百"]

    scales:
      - ["", "", ""]
      - ["万", "万", "万"]
      - ["亿", "亿", "亿"]
      - ["兆", "兆", "兆"]
      - ["京", "京", "京"]

    grammar:
      minus: "负"
      conjunction: "点"
      decimal_separator: "点"
      default_fraction: "分之"
    fractions:
      10: ["十分之一", "十分之", "十分之"]
      100: ["百分之一", "百分之", "百分之"]
      1000: ["千分之一", "千分之", "千分之"]
      10000: ["万分之一", "万分之", "万分之"]
      100000: ["十万分之一", "十万分之", "十万分之"]
      1000000: ["百万分之一", "百万分之", "百万分之"]
      10000000: ["千万分之一", "千万分之", "千万分之"]
      100000000: ["亿分之一", "亿分之", "亿分之"]
      1000000000: ["十亿分之一", "十亿分之", "十亿分之"]

    numbers:
      ordinals:
        nominative:
          masculine: ["第一", "第二", "第三", "第四", "第五", "第六", "第七", "第八", "第九", "第十",
                      "第十一", "第十二", "第十三", "第十四", "第十五", "第十六", "第十七", "第十八", "第十九",
                      "第二十", "第二十一", "第二十二", "第二十三", "第二十四", "第二十五", "第二十六", "第二十七", "第二十八", "第二十九",
                      "第三十", "第三十一"]
          feminine: ["第一", "第二", "第三", "第四", "第五", "第六", "第七", "第八", "第九", "第十",
                     "第十一", "第十二", "第十三", "第十四", "第十五", "第十六", "第十七", "第十八", "第十九",
                     "第二十", "第二十一", "第二十二", "第二十三", "第二十四", "第二十五", "第二十六", "第二十七", "第二十八", "第二十九",
                     "第三十", "第三十一"]
          neuter: ["第一", "第二", "第三", "第四", "第五", "第六", "第七", "第八", "第九", "第十",
                   "第十一", "第十二", "第十三", "第十四", "第十五", "第十六", "第十七", "第十八", "第十九",
                   "第二十", "第二十一", "第二十二", "第二十三", "第二十四", "第二十五", "第二十六", "第二十七", "第二十八", "第二十九",
                   "第三十", "第三十一"]
        default:
          masculine: ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十",
                      "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九",
                      "二十", "二十一", "二十二", "二十三", "二十四", "二十五", "二十六", "二十七", "二十八", "二十九",
                      "三十", "三十一"]

    datetime:
      template: "%{date} %{time}"
    date:
      template:
        default: "%{year}年%{month}月%{day}日"
        nominative: "%{year}年%{month}月%{day}日"
      months:
        default: ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"]
        nominative: ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours}%{minutes}"
        hours_minutes_seconds: "%{hours}%{minutes}%{seconds}"
      words:
        hour: ["点", "点", "点"]
        minute: ["分", "分", "分"]
        second: ["秒", "秒", "秒"]

    warnings:
      currency_not_available: "货币 %{currency} 不适用于语言环境 %{locale}，将使用当前货币。"

