nl:
  num2words:
    ones_masc: ["nul", "één", "twee", "drie", "vier", "vijf", "zes", "zeven", "acht", "negen"]
    ones_fem: ["nul", "één", "twee", "drie", "vier", "vijf", "zes", "zeven", "acht", "negen"]
    teens: ["tien", "elf", "twaalf", "dertien", "veertien", "vijftien", "zestien", "zeventien", "achttien", "negentien"]
    tens: ["", "", "twintig", "dertig", "veertig", "vijftig", "zestig", "zeventig", "tachtig", "negentig"]
    hundreds: ["", "honderd", "tweehonderd", "driehonderd", "vierhonderd", "vijfhonderd", "zeshonderd", "zevenhonderd", "achthonderd", "negenhonderd"]

    scales:
      - ["", "", ""]
      - ["duizend", "duizend", "duizend"]
      - ["miljoen", "miljoen", "miljoen"]
      - ["miljard", "miljard", "miljard"]
      - ["biljoen", "biljoen", "biljoen"]

    grammar:
      minus: "min"
      conjunction: "komma"
      default_fraction: "deel"
    fractions:
      10: ["tiende", "tienden", "tienden"]
      100: ["honderdste", "honderdsten", "honderdsten"]
      1000: ["duizendste", "duizendsten", "duizendsten"]
      10000: ["tienduizendste", "tienduizendsten", "tienduizendsten"]
      100000: ["honderdduizendste", "honderdduizendsten", "honderdduizendsten"]
      1000000: ["miljoenste", "miljoensten", "miljoensten"]
      10000000: ["tienmiljoenste", "tienmiljoensten", "tienmiljoensten"]
      100000000: ["honderdmiljoenste", "honderdmiljoensten", "honderdmiljoensten"]
      1000000000: ["miljardste", "miljardsten", "miljardsten"]

    numbers:
      ordinals:
        nominative:
          masculine: ["eerste", "tweede", "derde", "vierde", "vijfde", "zesde", "zevende", "achtste", "negende", "tiende",
                      "elfde", "twaalfde", "dertiende", "veertiende", "vijftiende", "zestiende", "zeventiende", "achttiende", "negentiende",
                      "twintigste", "eenentwintigste", "tweeëntwintigste", "drieëntwintigste", "vierentwintigste", "vijfentwintigste", "zesentwintigste", "zevenentwintigste", "achtentwintigste", "negenentwintigste",
                      "dertigste", "eenendertigste"]
          feminine: ["eerste", "tweede", "derde", "vierde", "vijfde", "zesde", "zevende", "achtste", "negende", "tiende",
                     "elfde", "twaalfde", "dertiende", "veertiende", "vijftiende", "zestiende", "zeventiende", "achttiende", "negentiende",
                     "twintigste", "eenentwintigste", "tweeëntwintigste", "drieëntwintigste", "vierentwintigste", "vijfentwintigste", "zesentwintigste", "zevenentwintigste", "achtentwintigste", "negenentwintigste",
                     "dertigste", "eenendertigste"]
          neuter: ["eerste", "tweede", "derde", "vierde", "vijfde", "zesde", "zevende", "achtste", "negende", "tiende",
                   "elfde", "twaalfde", "dertiende", "veertiende", "vijftiende", "zestiende", "zeventiende", "achttiende", "negentiende",
                   "twintigste", "eenentwintigste", "tweeëntwintigste", "drieëntwintigste", "vierentwintigste", "vijfentwintigste", "zesentwintigste", "zevenentwintigste", "achtentwintigste", "negenentwintigste",
                   "dertigste", "eenendertigste"]
        default:
          masculine: ["eerste", "tweede", "derde", "vierde", "vijfde", "zesde", "zevende", "achtste", "negende", "tiende",
                      "elfde", "twaalfde", "dertiende", "veertiende", "vijftiende", "zestiende", "zeventiende", "achttiende", "negentiende",
                      "twintigste", "eenentwintigste", "tweeëntwintigste", "drieëntwintigste", "vierentwintigste", "vijfentwintigste", "zesentwintigste", "zevenentwintigste", "achtentwintigste", "negenentwintigste",
                      "dertigste", "eenendertigste"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["januari", "februari", "maart", "april", "mei", "juni", "juli", "augustus", "september", "oktober", "november", "december"]
        nominative: ["januari", "februari", "maart", "april", "mei", "juni", "juli", "augustus", "september", "oktober", "november", "december"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["uur", "uur", "uur"]
        minute: ["minuut", "minuten", "minuten"]
        second: ["seconde", "seconden", "seconden"]

    warnings:
      currency_not_available: "Valuta %{currency} is niet beschikbaar voor locale %{lang}; huidige valuta wordt gebruikt."

    currencies:
