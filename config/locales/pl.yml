pl:
  num2words:
    ones_masc: ["zero", "jeden", "dwa", "trzy", "cztery", "pięć", "sześć", "siedem", "osiem", "dziewięć"]
    ones_fem: ["zero", "jedna", "dwie", "trzy", "cztery", "pięć", "sześć", "siedem", "osiem", "dziewięć"]
    teens: ["dziesięć", "jedenaście", "dwanaście", "trzynaście", "czternaście", "piętnaście", "szesnaście", "siedemnaście", "osiemnaście", "dziewiętnaście"]
    tens: ["", "", "dwadzieścia", "trzydzieści", "czterdzieści", "pięćdziesiąt", "sześćdziesiąt", "siedemdziesiąt", "osiemdziesiąt", "dziewięćdziesiąt"]
    hundreds: ["", "sto", "dwieście", "trzysta", "czterysta", "pięćset", "sześćset", "siedemset", "osiemset", "dziewięćset"]

    scales:
      - ["", "", ""]
      - ["tysiąc", "tysiące", "tysięcy"]
      - ["milion", "miliony", "milionów"]
      - ["miliard", "miliardy", "miliardów"]
      - ["bilion", "biliony", "bilionów"]

    grammar:
      minus: "minus"
      conjunction: "całych"
      default_fraction: "części"
    fractions:
      10: ["dziesiąta", "dziesiąte", "dziesiątych"]
      100: ["setna", "setne", "setnych"]
      1000: ["tysięczna", "tysięczne", "tysięcznych"]
      10000: ["dziesięciotysięczna", "dziesięciotysięczne", "dziesięciotysięcznych"]
      100000: ["stutysięczna", "stutysięczne", "stutysięcznych"]
      1000000: ["milionowa", "milionowe", "milionowych"]
      10000000: ["dziesięciomilionowa", "dziesięciomilionowe", "dziesięciomilionowych"]
      100000000: ["stumilionowa", "stumilionowe", "stumilionowych"]
      1000000000: ["miliardowa", "miliardowe", "miliardowych"]

    numbers:
      ordinals:
        nominative:
          masculine: ["pierwszy", "drugi", "trzeci", "czwarty", "piąty", "szósty", "siódmy", "ósmy", "dziewiąty", "dziesiąty",
                      "jedenasty", "dwunasty", "trzynasty", "czternasty", "piętnasty", "szesnasty", "siedemnasty", "osiemnasty", "dziewiętnasty",
                      "dwudziesty", "dwudziesty pierwszy", "dwudziesty drugi", "dwudziesty trzeci", "dwudziesty czwarty", "dwudziesty piąty", "dwudziesty szósty", "dwudziesty siódmy", "dwudziesty ósmy", "dwudziesty dziewiąty",
                      "trzydziesty", "trzydziesty pierwszy"]
          feminine: ["pierwsza", "druga", "trzecia", "czwarta", "piąta", "szósta", "siódma", "ósma", "dziewiąta", "dziesiąta",
                     "jedenasta", "dwunasta", "trzynasta", "czternasta", "piętnasta", "szesnasta", "siedemnasta", "osiemnasta", "dziewiętnasta",
                     "dwudziesta", "dwudziesta pierwsza", "dwudziesta druga", "dwudziesta trzecia", "dwudziesta czwarta", "dwudziesta piąta", "dwudziesta szósta", "dwudziesta siódma", "dwudziesta ósma", "dwudziesta dziewiąta",
                     "trzydziesta", "trzydziesta pierwsza"]
          neuter: ["pierwsze", "drugie", "trzecie", "czwarte", "piąte", "szóste", "siódme", "ósme", "dziewiąte", "dziesiąte",
                   "jedenaste", "dwunaste", "trzynaste", "czternaste", "piętnaste", "szesnaste", "siedemnaste", "osiemnaste", "dziewiętnaste",
                   "dwudzieste", "dwudzieste pierwsze", "dwudzieste drugie", "dwudzieste trzecie", "dwudzieste czwarte", "dwudzieste piąte", "dwudzieste szóste", "dwudzieste siódme", "dwudzieste ósme", "dwudzieste dziewiąte",
                   "trzydzieste", "trzydzieste pierwsze"]
        default:
          masculine: ["pierwszego", "drugiego", "trzeciego", "czwartego", "piątego", "szóstego", "siódmego", "ósmego", "dziewiątego", "dziesiątego",
                      "jedenastego", "dwunastego", "trzynastego", "czternastego", "piętnastego", "szesnastego", "siedemnastego", "osiemnastego", "dziewiętnastego",
                      "dwudziestego", "dwudziestego pierwszego", "dwudziestego drugiego", "dwudziestego trzeciego", "dwudziestego czwartego", "dwudziestego piątego", "dwudziestego szóstego", "dwudziestego siódmego", "dwudziestego ósmego", "dwudziestego dziewiątego",
                      "trzydziestego", "trzydziestego pierwszego"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year} roku"
        nominative: "%{day} %{month} %{year} rok"
      months:
        default: ["stycznia", "lutego", "marca", "kwietnia", "maja", "czerwca", "lipca", "sierpnia", "września", "października", "listopada", "grudnia"]
        nominative: ["styczeń", "luty", "marzec", "kwiecień", "maj", "czerwiec", "lipiec", "sierpień", "wrzesień", "październik", "listopad", "grudzień"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["godzina", "godziny", "godzin"]
        minute: ["minuta", "minuty", "minut"]
        second: ["sekunda", "sekundy", "sekund"]

    warnings:
      currency_not_available: "Waluta %{currency} nie jest dostępna dla języka %{lang}, używana jest bieżąca."

    currencies:
