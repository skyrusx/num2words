sv:
  num2words:
    ones_masc: ["noll", "ett", "två", "tre", "fyra", "fem", "sex", "sju", "åtta", "nio"]
    ones_fem: ["noll", "en", "två", "tre", "fyra", "fem", "sex", "sju", "åtta", "nio"]
    teens: ["tio", "elva", "tolv", "tretton", "fjorton", "femton", "sexton", "sjutton", "arton", "nitton"]
    tens: ["", "", "tjugo", "trettio", "fyrtio", "femtio", "sextio", "sjuttio", "åttio", "nittio"]
    hundreds: ["", "hundra", "tvåhundra", "trehundra", "fyrahundra", "femhundra", "sexhundra", "sjuhundra", "åttahundra", "niohundra"]

    scales:
      - ["", "", ""]
      - ["tusen", "tusen", "tusen"]
      - ["miljon", "miljoner", "miljoner"]
      - ["miljard", "miljarder", "miljarder"]
      - ["biljon", "biljoner", "biljoner"]

    grammar:
      minus: "minus"
      conjunction: "komma"
      default_fraction: "delar"
    fractions:
      10: ["tiondel", "tiondelar", "tiondelar"]
      100: ["hundradel", "hundradelar", "hundradelar"]
      1000: ["tusendel", "tusendelar", "tusendelar"]
      10000: ["tiotusendel", "tiotusendelar", "tiotusendelar"]
      100000: ["hundratusendel", "hundratusendelar", "hundratusendelar"]
      1000000: ["miljondel", "miljondelar", "miljondelar"]
      10000000: ["tiomiljondel", "tiomiljondelar", "tiomiljondelar"]
      100000000: ["hundramiljondel", "hundramiljondelar", "hundramiljondelar"]
      1000000000: ["miljarddel", "miljarddelar", "miljarddelar"]

    numbers:
      ordinals:
        nominative:
          masculine: ["första", "andra", "tredje", "fjärde", "femte", "sjätte", "sjunde", "åttonde", "nionde", "tionde",
                      "elfte", "tolfte", "trettonde", "fjortonde", "femtonde", "sextonde", "sjuttonde", "artonde", "nittonde",
                      "tjugonde", "tjugoförsta", "tjugoandra", "tjugotredje", "tjugofjärde", "tjugofemte", "tjugosjätte", "tjugosjunde", "tjugoåttonde", "tjugonionde",
                      "trettionde", "trettioförsta"]
          feminine: ["första", "andra", "tredje", "fjärde", "femte", "sjätte", "sjunde", "åttonde", "nionde", "tionde",
                     "elfte", "tolfte", "trettonde", "fjortonde", "femtonde", "sextonde", "sjuttonde", "artonde", "nittonde",
                     "tjugonde", "tjugoförsta", "tjugoandra", "tjugotredje", "tjugofjärde", "tjugofemte", "tjugosjätte", "tjugosjunde", "tjugoåttonde", "tjugonionde",
                     "trettionde", "trettioförsta"]
          neuter: ["första", "andra", "tredje", "fjärde", "femte", "sjätte", "sjunde", "åttonde", "nionde", "tionde",
                   "elfte", "tolfte", "trettonde", "fjortonde", "femtonde", "sextonde", "sjuttonde", "artonde", "nittonde",
                   "tjugonde", "tjugoförsta", "tjugoandra", "tjugotredje", "tjugofjärde", "tjugofemte", "tjugosjätte", "tjugosjunde", "tjugoåttonde", "tjugonionde",
                   "trettionde", "trettioförsta"]
        default:
          masculine: ["första", "andra", "tredje", "fjärde", "femte", "sjätte", "sjunde", "åttonde", "nionde", "tionde",
                      "elfte", "tolfte", "trettonde", "fjortonde", "femtonde", "sextonde", "sjuttonde", "artonde", "nittonde",
                      "tjugonde", "tjugoförsta", "tjugoandra", "tjugotredje", "tjugofjärde", "tjugofemte", "tjugosjätte", "tjugosjunde", "tjugoåttonde", "tjugonionde",
                      "trettionde", "trettioförsta"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["januari", "februari", "mars", "april", "maj", "juni", "juli", "augusti", "september", "oktober", "november", "december"]
        nominative: ["januari", "februari", "mars", "april", "maj", "juni", "juli", "augusti", "september", "oktober", "november", "december"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["timme", "timmar", "timmar"]
        minute: ["minut", "minuter", "minuter"]
        second: ["sekund", "sekunder", "sekunder"]

    warnings:
      currency_not_available: "Valuta %{currency} är inte tillgänglig för språket %{lang}; aktuell valuta används."

    currencies:
