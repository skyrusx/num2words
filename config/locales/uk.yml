          masculine: ["першого", "другого", "третього", "четвертого", "п'ятого", "шостого", "сьомого", "восьмого", "дев'ятого", "десятого",
                      "одинадцятого", "дванадцятого", "тринадцятого", "чотирнадцятого", "п'ятнадцятого", "шістнадцятого", "сімнадцятого", "вісімнадцятого", "дев'ятнадцятого",
                      "двадцятого", "двадцять першого", "двадцять другого", "двадцять третього", "двадцять четвертого", "двадцять п'ятого", "двадцять шостого", "двадцять сьомого", "двадцять восьмого", "двадцять дев'ятого",
                      "тридцятого", "тридцять першого"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year} року"
        nominative: "%{day} %{month} %{year} рік"
      months:
        default: ["січня", "лютого", "березня", "квітня", "травня", "червня", "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"]
        nominative: ["січень", "лютий", "березень", "квітень", "травень", "червень", "липень", "серпень", "вересень", "жовтень", "листопад", "грудень"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["година", "години", "годин"]
        minute: ["хвилина", "хвилини", "хвилин"]
        second: ["секунда", "секунди", "секунд"]

    warnings:
      currency_not_available: "Валюта %{currency} недоступна для локалі %{locale}, використовується поточна."

