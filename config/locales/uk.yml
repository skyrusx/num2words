uk:
  num2words:
    ones_masc: ["нуль", "один", "два", "три", "чотири", "п'ять", "шість", "сім", "вісім", "дев'ять"]
    ones_fem: ["нуль", "одна", "дві", "три", "чотири", "п'ять", "шість", "сім", "вісім", "дев'ять"]
    teens: ["десять", "одинадцять", "дванадцять", "тринадцять", "чотирнадцять", "п'ятнадцять", "шістнадцять", "сімнадцять", "вісімнадцять", "дев'ятнадцять"]
    tens: ["", "", "двадцять", "тридцять", "сорок", "п'ятдесят", "шістдесят", "сімдесят", "вісімдесят", "дев'яносто"]
    hundreds: ["", "сто", "двісті", "триста", "чотириста", "п'ятсот", "шістсот", "сімсот", "вісімсот", "дев'ятсот"]

    scales:
      - ["", "", ""]
      - ["тисяча", "тисячі", "тисяч"]
      - ["мільйон", "мільйони", "мільйонів"]
      - ["мільярд", "мільярди", "мільярдів"]
      - ["трильйон", "трильйони", "трильйонів"]

    grammar:
      minus: "мінус"
      conjunction: "цілих"
      default_fraction: "частин"
    fractions:
      10: ["десята", "десяті", "десятих"]
      100: ["сота", "соті", "сотих"]
      1000: ["тисячна", "тисячні", "тисячних"]
      10000: ["десятитисячна", "десятитисячні", "десятитисячних"]
      100000: ["стотисячна", "стотисячні", "стотисячних"]
      1000000: ["мільйонна", "мільйонні", "мільйонних"]
      10000000: ["десятимільйонна", "десятимільйонні", "десятимільйонних"]
      100000000: ["стомільйонна", "стомільйонні", "стомільйонних"]
      1000000000: ["мільярдна", "мільярдні", "мільярдних"]

    numbers:
      ordinals:
        nominative:
          masculine: ["перший", "другий", "третій", "четвертий", "п'ятий", "шостий", "сьомий", "восьмий", "дев'ятий", "десятий",
