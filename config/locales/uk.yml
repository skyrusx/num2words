                      "тридцятий", "тридцять перший"]
          feminine: ["перша", "друга", "третя", "четверта", "п'ята", "шоста", "сьома", "восьма", "дев'ята", "десята",
                     "одинадцята", "дванадцята", "тринадцята", "чотирнадцята", "п'ятнадцята", "шістнадцята", "сімнадцята", "вісімнадцята", "дев'ятнадцята",
                     "двадцята", "двадцять перша", "двадцять друга", "двадцять третя", "двадцять четверта", "двадцять п'ята", "двадцять шоста", "двадцять сьома", "двадцять восьма", "двадцять дев'ята",
                     "тридцята", "тридцять перша"]
          neuter: ["перше", "друге", "третє", "четверте", "п'яте", "шосте", "сьоме", "восьме", "дев'яте", "десяте",
                   "одинадцяте", "дванадцяте", "тринадцяте", "чотирнадцяте", "п'ятнадцяте", "шістнадцяте", "сімнадцяте", "вісімнадцяте", "дев'ятнадцяте",
                   "двадцяте", "двадцять перше", "двадцять друге", "двадцять третє", "двадцять четверте", "двадцять п'яте", "двадцять шосте", "двадцять сьоме", "двадцять восьме", "двадцять дев'яте",
                   "тридцяте", "тридцять перше"]
