lt:
  num2words:
    ones_masc: ["nulis", "vienas", "du", "trys", "keturi", "penki", "šeši", "septyni", "aštuoni", "devyni"]
    ones_fem: ["nulis", "viena", "dvi", "trys", "keturios", "penkios", "šešios", "septynios", "aštuonios", "devynios"]
    teens: ["dešimt", "vienuolika", "dvylika", "trylika", "keturiolika", "penkiolika", "šešiolika", "septyniolika", "aštuoniolika", "devyniolika"]
    tens: ["", "", "dvidešimt", "trisdešimt", "keturiasdešimt", "penkiasdešimt", "šešiasdešimt", "septyniasdešimt", "aštuoniasdešimt", "devyniasdešimt"]
    hundreds: ["", "šimtas", "du šimtai", "trys šimtai", "keturi šimtai", "penki šimtai", "šeši šimtai", "septyni šimtai", "aštuoni šimtai", "devyni šimtai"]

    scales:
      - ["", "", ""]
      - ["tūkstantis", "tūkstančiai", "tūkstančių"]
      - ["milijonas", "milijonai", "milijonų"]
      - ["milijardas", "milijardai", "milijardų"]
      - ["trilijonas", "trilijonai", "trilijonų"]

    grammar:
      minus: "minus"
      conjunction: "sveikųjų"
      default_fraction: "dalis"
    fractions:
      10: ["dešimtoji", "dešimtosios", "dešimtųjų"]
      100: ["šimtoji", "šimtosios", "šimtųjų"]
      1000: ["tūkstantoji", "tūkstantosios", "tūkstantųjų"]
      10000: ["dešimttūkstantoji", "dešimttūkstantosios", "dešimttūkstantųjų"]
      100000: ["šimtatūkstantoji", "šimtatūkstantosios", "šimtatūkstantųjų"]
      1000000: ["milijonoji", "milijonosios", "milijonųjų"]
      10000000: ["dešimtmilijonoji", "dešimtmilijonosios", "dešimtmilijonųjų"]
      100000000: ["šimtmilijonoji", "šimtmilijonosios", "šimtmilijonųjų"]
      1000000000: ["milijardoji", "milijardosios", "milijardųjų"]

    numbers:
      ordinals:
        nominative:
          masculine: ["pirmas", "antras", "trečias", "ketvirtas", "penktas", "šeštas", "septintas", "aštuntas", "devintas", "dešimtas",
                      "vienuoliktas", "dvyliktas", "tryliktas", "keturioliktas", "penkioliktas", "šešioliktas", "septynioliktas", "aštuonioliktas", "devynioliktas",
