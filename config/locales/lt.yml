                      "trisdešimtoji", "trisdešimt pirmoji"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["sausio", "vasario", "kovo", "balandžio", "gegužės", "birželio", "liepos", "rugpjūčio", "rugsėjo", "spalio", "lapkričio", "gruodžio"]
        nominative: ["sausis", "vasaris", "kovas", "balandis", "gegužė", "birželis", "liepa", "rugpjūtis", "rugsėjis", "spalis", "lapkritis", "gruodis"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["valanda", "valandos", "valandų"]
        minute: ["minutė", "minutės", "minučių"]
        second: ["sekundė", "sekundės", "sekundžių"]

    warnings:
      currency_not_available: "Valiuta %{currency} neprieinama lokalėje %{lang}, naudojama numatytoji."

