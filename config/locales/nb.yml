nb:
  num2words:
    ones_masc: ["null", "en", "to", "tre", "fire", "fem", "seks", "sju", "åtte", "ni"]
    ones_fem: ["null", "ei", "to", "tre", "fire", "fem", "seks", "sju", "åtte", "ni"]
    teens: ["ti", "elleve", "tolv", "tretten", "fjorten", "femten", "seksten", "sytten", "atten", "nitten"]
    tens: ["", "", "tjue", "tretti", "førti", "femti", "seksti", "sytti", "åtti", "nitti"]
    hundreds: ["", "hundre", "to hundre", "tre hundre", "fire hundre", "fem hundre", "seks hundre", "sju hundre", "åtte hundre", "ni hundre"]

    scales:
      - ["", "", ""]
      - ["tusen", "tusen", "tusen"]
      - ["million", "millioner", "millioner"]
      - ["milliard", "milliarder", "milliarder"]
      - ["billion", "billioner", "billioner"]

    grammar:
      minus: "minus"
      conjunction: "komma"
      default_fraction: "del"
    fractions:
      10: ["tidel", "tideler", "tideler"]
      100: ["hundredel", "hundredeler", "hundredeler"]
      1000: ["tusendel", "tusendeler", "tusendeler"]
      10000: ["titusendel", "titusendeler", "titusendeler"]
      100000: ["hundretusendel", "hundretusendeler", "hundretusendeler"]
      1000000: ["milliondel", "milliondeler", "milliondeler"]
      10000000: ["timilliondel", "timilliondeler", "timilliondeler"]
      100000000: ["hundremilliondel", "hundremilliondeler", "hundremilliondeler"]
      1000000000: ["milliarddel", "milliarddeler", "milliarddeler"]

    numbers:
      ordinals:
        nominative:
          masculine: ["første", "andre", "tredje", "fjerde", "femte", "sjette", "sjuende", "åttende", "niende", "tiende",
                      "ellevte", "tolvte", "trettende", "fjortende", "femtende", "sekstende", "syttende", "attende", "nittende",
                      "tjuende", "tjueførste", "tjueandre", "tjuetredje", "tjuefjerde", "tjuefemte", "tjuesjette", "tjuesjuende", "tjueåttende", "tjueniende",
                      "trettiende", "trettiførste"]
          feminine: ["første", "andre", "tredje", "fjerde", "femte", "sjette", "sjuende", "åttende", "niende", "tiende",
                     "ellevte", "tolvte", "trettende", "fjortende", "femtende", "sekstende", "syttende", "attende", "nittende",
                     "tjuende", "tjueførste", "tjueandre", "tjuetredje", "tjuefjerde", "tjuefemte", "tjuesjette", "tjuesjuende", "tjueåttende", "tjueniende",
                     "trettiende", "trettiførste"]
          neuter: ["første", "andre", "tredje", "fjerde", "femte", "sjette", "sjuende", "åttende", "niende", "tiende",
                   "ellevte", "tolvte", "trettende", "fjortende", "femtende", "sekstende", "syttende", "attende", "nittende",
                   "tjuende", "tjueførste", "tjueandre", "tjuetredje", "tjuefjerde", "tjuefemte", "tjuesjette", "tjuesjuende", "tjueåttende", "tjueniende",
                   "trettiende", "trettiførste"]
        default:
          masculine: ["første", "andre", "tredje", "fjerde", "femte", "sjette", "sjuende", "åttende", "niende", "tiende",
                      "ellevte", "tolvte", "trettende", "fjortende", "femtende", "sekstende", "syttende", "attende", "nittende",
                      "tjuende", "tjueførste", "tjueandre", "tjuetredje", "tjuefjerde", "tjuefemte", "tjuesjette", "tjuesjuende", "tjueåttende", "tjueniende",
                      "trettiende", "trettiførste"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day}. %{month} %{year}"
        nominative: "%{day}. %{month} %{year}"
      months:
        default: ["januar", "februar", "mars", "april", "mai", "juni", "juli", "august", "september", "oktober", "november", "desember"]
        nominative: ["januar", "februar", "mars", "april", "mai", "juni", "juli", "august", "september", "oktober", "november", "desember"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["time", "timer", "timer"]
        minute: ["minutt", "minutter", "minutter"]
        second: ["sekund", "sekunder", "sekunder"]

    warnings:
      currency_not_available: "Valutaen %{currency} er ikke tilgjengelig for lokaliteten %{lang}, bruker gjeldende valuta."

    currencies:
