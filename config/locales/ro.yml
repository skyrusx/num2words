        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["oră", "ore", "ore"]
        minute: ["minut", "minute", "minute"]
        second: ["secundă", "secunde", "secunde"]

