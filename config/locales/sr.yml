sr:
  num2words:
    ones_masc: ["нула", "један", "два", "три", "четири", "пет", "шест", "седам", "осам", "девет"]
    ones_fem: ["нула", "једна", "две", "три", "четири", "пет", "шест", "седам", "осам", "девет"]
    teens: ["десет", "једанаест", "дванаест", "тринаест", "четрнаест", "петнаест", "шеснаест", "седамнаест", "осамнаест", "деветнаест"]
    tens: ["", "", "двадесет", "тридесет", "четрдесет", "педесет", "шездесет", "седамдесет", "осамдесет", "деведесет"]
    hundreds: ["", "сто", "двеста", "триста", "четиристо", "петсто", "шестсто", "седамсто", "осамсто", "деветсто"]

    scales:
      - ["", "", ""]
      - ["хиљада", "хиљаде", "хиљада"]
      - ["милион", "милиона", "милиона"]
      - ["милијарда", "милијарде", "милијарди"]
      - ["билион", "билиона", "билиона"]

    grammar:
      minus: "минус"
      conjunction: "целих"
      default_fraction: "делова"
    fractions:
      10: ["десетина", "десетине", "десетина"]
      100: ["стотина", "стотине", "стотина"]
      1000: ["хиљадити", "хиљадита", "хиљадитих"]
      10000: ["десетохиљадити", "десетохиљадита", "десетохиљадитих"]
      100000: ["стохиљадити", "стохиљадита", "стохиљадитих"]
      1000000: ["милионити", "милионита", "милионитих"]
      10000000: ["десетомилионити", "десетомилионита", "десетомилионитих"]
      100000000: ["стомилионити", "стомилионита", "стомилионитих"]
      1000000000: ["милијардити", "милијардита", "милијардитих"]

    numbers:
      ordinals:
        nominative:
          masculine: ["први", "други", "трећи", "четврти", "пети", "шести", "седми", "осми", "девети", "десети",
                      "једанаести", "дванаести", "тринаести", "четрнаести", "петнаести", "шеснаести", "седамнаести", "осамнаести", "деветнаести",
                      "двадесети", "двадесет први", "двадесет други", "двадесет трећи", "двадесет четврти", "двадесет пети", "двадесет шести", "двадесет седми", "двадесет осми", "двадесет девети",
                      "тридесети", "тридесет први"]
          feminine: ["прва", "друга", "трећа", "четврта", "пета", "шеста", "седма", "осма", "девета", "десета",
                     "једанаеста", "дванаеста", "тринаеста", "четрнаеста", "петнаеста", "шеснаеста", "седамнаеста", "осамнаеста", "деветнаеста",
                     "двадесета", "двадесет прва", "двадесет друга", "двадесет трећа", "двадесет четврта", "двадесет пета", "двадесет шеста", "двадесет седма", "двадесет осма", "двадесет девета",
                     "тридесета", "тридесет прва"]
          neuter: ["прво", "друго", "треће", "четврто", "пето", "шесто", "седмо", "осмо", "девето", "десето",
                   "једанаесто", "дванаесто", "тринаесто", "четрнаесто", "петнаесто", "шеснаесто", "седамнаесто", "осамнаесто", "деветнаесто",
                   "двадесето", "двадесет прво", "двадесет друго", "двадесет треће", "двадесет четврто", "двадесет пето", "двадесет шесто", "двадесет седмо", "двадесет осмо", "двадесет девето",
                   "тридесето", "тридесет прво"]
        default:
          masculine: ["првог", "другог", "трећег", "четвртог", "петог", "шестог", "седмог", "осмог", "деветог", "десетог",
                      "једанаестог", "дванаестог", "тринаестог", "четрнаестог", "петнаестог", "шеснаестог", "седамнаестог", "осамнаестог", "деветнаестог",
                      "двадесетог", "двадесет првог", "двадесет другог", "двадесет трећег", "двадесет четвртог", "двадесет петог", "двадесет шестог", "двадесет седмог", "двадесет осмог", "двадесет деветог",
                      "тридесетог", "тридесет првог"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["јануара", "фебруара", "марта", "априла", "маја", "јуна", "јула", "августа", "септембра", "октобра", "новембра", "децембра"]
        nominative: ["јануар", "фебруар", "март", "април", "мај", "јун", "јул", "август", "септембар", "октобар", "новембар", "децембар"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["сат", "сата", "сати"]
        minute: ["минут", "минута", "минута"]
        second: ["секунда", "секунде", "секунди"]

    warnings:
      currency_not_available: "Валута %{currency} није доступна за језик %{lang}, користи се тренутна."

