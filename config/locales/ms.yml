        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["jam", "jam", "jam"]
        minute: ["minit", "minit", "minit"]
        second: ["saat", "saat", "saat"]

    warnings:
