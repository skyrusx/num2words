pt:
  num2words:
    ones_masc: ["zero", "um", "dois", "três", "quatro", "cinco", "seis", "sete", "oito", "nove"]
    ones_fem: ["zero", "uma", "duas", "três", "quatro", "cinco", "seis", "sete", "oito", "nove"]
    teens: ["dez", "onze", "doze", "treze", "catorze", "quinze", "dezesseis", "dezessete", "dezoito", "dezenove"]
    tens: ["", "", "vinte", "trinta", "quarenta", "cinquenta", "sessenta", "setenta", "oitenta", "noventa"]
    hundreds: ["", "cento", "duzentos", "trezentos", "quatrocentos", "quinhentos", "seiscentos", "setecentos", "oitocentos", "novecentos"]

    scales:
      - ["", "", ""]
      - ["mil", "mil", "mil"]
      - ["milhão", "milhões", "milhões"]
      - ["bilhão", "bilhões", "bilhões"]
      - ["trilhão", "trilhões", "trilhões"]

    grammar:
      minus: "menos"
      conjunction: "inteiros"
      default_fraction: "partes"
    fractions:
      10: ["décimo", "décimos", "décimos"]
      100: ["centésimo", "centésimos", "centésimos"]
      1000: ["milésimo", "milésimos", "milésimos"]
      10000: ["décimo de milésimo", "décimos de milésimo", "décimos de milésimo"]
      100000: ["centésimo de milésimo", "centésimos de milésimo", "centésimos de milésimo"]
      1000000: ["milionésimo", "milionésimos", "milionésimos"]
      10000000: ["décimo de milionésimo", "décimos de milionésimo", "décimos de milionésimo"]
      100000000: ["centésimo de milionésimo", "centésimos de milionésimo", "centésimos de milionésimo"]
      1000000000: ["bilionésimo", "bilionésimos", "bilionésimos"]

    numbers:
      ordinals:
        nominative:
          masculine: ["primeiro", "segundo", "terceiro", "quarto", "quinto", "sexto", "sétimo", "oitavo", "nono", "décimo",
                      "décimo primeiro", "décimo segundo", "décimo terceiro", "décimo quarto", "décimo quinto", "décimo sexto", "décimo sétimo", "décimo oitavo", "décimo nono",
                      "vigésimo", "vigésimo primeiro", "vigésimo segundo", "vigésimo terceiro", "vigésimo quarto", "vigésimo quinto", "vigésimo sexto", "vigésimo sétimo", "vigésimo oitavo", "vigésimo nono",
                      "trigésimo", "trigésimo primeiro"]
          feminine: ["primeira", "segunda", "terceira", "quarta", "quinta", "sexta", "sétima", "oitava", "nona", "décima",
                     "décima primeira", "décima segunda", "décima terceira", "décima quarta", "décima quinta", "décima sexta", "décima sétima", "décima oitava", "décima nona",
                     "vigésima", "vigésima primeira", "vigésima segunda", "vigésima terceira", "vigésima quarta", "vigésima quinta", "vigésima sexta", "vigésima sétima", "vigésima oitava", "vigésima nona",
                     "trigésima", "trigésima primeira"]
          neuter: ["primeiro", "segundo", "terceiro", "quarto", "quinto", "sexto", "sétimo", "oitavo", "nono", "décimo",
                   "décimo primeiro", "décimo segundo", "décimo terceiro", "décimo quarto", "décimo quinto", "décimo sexto", "décimo sétimo", "décimo oitavo", "décimo nono",
                   "vigésimo", "vigésimo primeiro", "vigésimo segundo", "vigésimo terceiro", "vigésimo quarto", "vigésimo quinto", "vigésimo sexto", "vigésimo sétimo", "vigésimo oitavo", "vigésimo nono",
                   "trigésimo", "trigésimo primeiro"]
        default:
          masculine: ["primeiro", "segundo", "terceiro", "quarto", "quinto", "sexto", "sétimo", "oitavo", "nono", "décimo",
                      "décimo primeiro", "décimo segundo", "décimo terceiro", "décimo quarto", "décimo quinto", "décimo sexto", "décimo sétimo", "décimo oitavo", "décimo nono",
                      "vigésimo", "vigésimo primeiro", "vigésimo segundo", "vigésimo terceiro", "vigésimo quarto", "vigésimo quinto", "vigésimo sexto", "vigésimo sétimo", "vigésimo oitavo", "vigésimo nono",
                      "trigésimo", "trigésimo primeiro"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} de %{month} de %{year}"
        nominative: "%{day} de %{month} de %{year}"
      months:
        default: ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"]
        nominative: ["janeiro", "fevereiro", "março", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["hora", "horas", "horas"]
        minute: ["minuto", "minutos", "minutos"]
        second: ["segundo", "segundos", "segundos"]

    warnings:
      currency_not_available: "Moeda %{currency} não disponível para o idioma %{lang}; usando a atual."

    currencies:
