sl:
  num2words:
    ones_masc: ["nič", "en", "dva", "tri", "štiri", "pet", "šest", "sedem", "osem", "devet"]
    ones_fem: ["nič", "ena", "dve", "tri", "štiri", "pet", "šest", "sedem", "osem", "devet"]
    teens: ["deset", "enajst", "dvanajst", "trinajst", "štirinajst", "petnajst", "šestnajst", "sedemnajst", "osemnajst", "devetnajst"]
    tens: ["", "", "dvajset", "trideset", "štirideset", "petdeset", "šestdeset", "sedemdeset", "osemdeset", "devetdeset"]
    hundreds: ["", "sto", "dvesto", "tristo", "štiristo", "petsto", "šeststo", "sedemsto", "osemsto", "devetsto"]

    scales:
      - ["", "", ""]
      - ["tisoč", "tisoč", "tisoč"]
      - ["milijon", "milijona", "milijonov"]
      - ["milijarda", "milijardi", "milijard"]
      - ["bilijon", "bilijona", "bilijonov"]

    grammar:
      minus: "minus"
      conjunction: "celih"
      default_fraction: "delov"
    fractions:
      10: ["desetina", "desetini", "desetin"]
      100: ["stotina", "stotini", "stotin"]
      1000: ["tisočina", "tisočini", "tisočin"]
      10000: ["desettisočina", "desettisočini", "desettisočin"]
      100000: ["stotisočina", "stotisočini", "stotisočin"]
      1000000: ["milijoninka", "milijoninki", "milijonink"]
      10000000: ["desetmilijoninka", "desetmilijoninki", "desetmilijonink"]
      100000000: ["stomilijoninka", "stomilijoninki", "stomilijonink"]
      1000000000: ["milijardinka", "milijardinki", "milijardink"]

    numbers:
      ordinals:
        nominative:
          masculine: ["prvi", "drugi", "tretji", "četrti", "peti", "šesti", "sedmi", "osmi", "deveti", "deseti",
                      "enajsti", "dvanajsti", "trinajsti", "štirinajsti", "petnajsti", "šestnajsti", "sedemnajsti", "osemnajsti", "devetnajsti",
                      "dvajseti", "enaindvajseti", "dvaindvajseti", "triindvajseti", "štiriindvajseti", "petindvajseti", "šestindvajseti", "sedemindvajseti", "osemindvajseti", "devetindvajseti",
                      "trideseti", "enaintrideseti"]
          feminine: ["prva", "druga", "tretja", "četrta", "peta", "šesta", "sedma", "osma", "deveta", "deseta",
                     "enajsta", "dvanajsta", "trinajsta", "štirinajsta", "petnajsta", "šestnajsta", "sedemnajsta", "osemnajsta", "devetnajsta",
                     "dvajseta", "enaindvajseta", "dvaindvajseta", "triindvajseta", "štiriindvajseta", "petindvajseta", "šestindvajseta", "sedemindvajseta", "osemindvajseta", "devetindvajseta",
                     "trideseta", "enaintrideseta"]
          neuter: ["prvo", "drugo", "tretje", "četrto", "peto", "šesto", "sedmo", "osmo", "deveto", "deseto",
                   "enajsto", "dvanajsto", "trinajsto", "štirinajsto", "petnajsto", "šestnajsto", "sedemnajsto", "osemnajsto", "devetnajsto",
                   "dvajseto", "enaindvajseto", "dvaindvajseto", "triindvajseto", "štiriindvajseto", "petindvajseto", "šestindvajseto", "sedemindvajseto", "osemindvajseto", "devetindvajseto",
                   "trideseto", "enaintrideseto"]
        default:
          masculine: ["prvega", "drugega", "tretjega", "četrtega", "petega", "šestega", "sedmega", "osmega", "devetega", "desetega",
                      "enajstega", "dvanajstega", "trinajstega", "štirinajstega", "petnajstega", "šestnajstega", "sedemnajstega", "osemnajstega", "devetnajstega",
                      "dvajsetega", "enaindvajsetega", "dvaindvajsetega", "triindvajsetega", "štiriindvajsetega", "petindvajsetega", "šestindvajsetega", "sedemindvajsetega", "osemindvajsetega", "devetindvajsetega",
                      "tridesetega", "enaintridesetega"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["januarja", "februarja", "marca", "aprila", "maja", "junija", "julija", "avgusta", "septembra", "oktobra", "novembra", "decembra"]
        nominative: ["januar", "februar", "marec", "april", "maj", "junij", "julij", "avgust", "september", "oktober", "november", "december"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["ura", "uri", "ur"]
        minute: ["minuta", "minuti", "minut"]
        second: ["sekunda", "sekundi", "sekund"]

    warnings:
      currency_not_available: "Valuta %{currency} ni na voljo za jezik %{lang}, uporabljena je trenutna."

    currencies:
      EUR:
        major_unit: ["evro", "evra", "evrov"]
        minor_unit: ["cent", "centa", "centov"]
        symbol: "€"
