sk:
  num2words:
    ones_masc: ["nula", "jeden", "dva", "tri", "štyri", "päť", "šesť", "sedem", "osem", "deväť"]
    ones_fem: ["nula", "jedna", "dve", "tri", "štyri", "päť", "šesť", "sedem", "osem", "deväť"]
    teens: ["desať", "jedenásť", "dvanásť", "trinásť", "štrnásť", "pätnásť", "šestnásť", "sedemnásť", "osemnásť", "devätnásť"]
    tens: ["", "", "dvadsať", "tridsať", "štyridsať", "päťdesiat", "šesťdesiat", "sedemdesiat", "osemdesiat", "deväťdesiat"]
    hundreds: ["", "sto", "dvesto", "tristo", "štyristo", "päťsto", "šesťsto", "sedemsto", "osemsto", "deväťsto"]

    scales:
      - ["", "", ""]
      - ["tisíc", "tisíce", "tisíc"]
      - ["milión", "milióny", "miliónov"]
      - ["miliarda", "miliardy", "miliárd"]
      - ["bilión", "bilióny", "biliónov"]

    grammar:
      minus: "mínus"
      conjunction: "celých"
      default_fraction: "desatinných"
    fractions:
      10: ["desatina", "desatiny", "desatín"]
      100: ["stotina", "stotiny", "stotín"]
      1000: ["tisícina", "tisíciny", "tisícin"]
      10000: ["desaťtisícina", "desaťtisíciny", "desaťtisícin"]
      100000: ["stotisícina", "stotisíciny", "stotisícin"]
      1000000: ["milióntina", "milióntiny", "milióntin"]
      10000000: ["desaťmilióntina", "desaťmilióntiny", "desaťmilióntin"]
      100000000: ["stomilióntina", "stomilióntiny", "stomilióntin"]
      1000000000: ["miliardtina", "miliardtiny", "miliardtín"]

    numbers:
      ordinals:
        nominative:
          masculine: ["prvý", "druhý", "tretí", "štvrtý", "piaty", "šiesty", "siedmy", "ôsmy", "deviaty", "desiaty",
                      "jedenásty", "dvanásty", "trinásty", "štrnásty", "pätnásty", "šestnásty", "sedemnásty", "osemnásty", "devätnásty",
                      "dvadsiaty", "dvadsiaty prvý", "dvadsiaty druhý", "dvadsiaty tretí", "dvadsiaty štvrtý", "dvadsiaty piaty", "dvadsiaty šiesty", "dvadsiaty siedmy", "dvadsiaty ôsmy", "dvadsiaty deviaty",
                      "tridsiaty", "tridsiaty prvý"]
          feminine: ["prvá", "druhá", "tretia", "štvrtá", "piata", "šiesta", "siedma", "ôsma", "deviata", "desiata",
                     "jedenásta", "dvanásta", "trinásta", "štrnásta", "pätnásta", "šestnásta", "sedemnásta", "osemnásta", "devätnásta",
                     "dvadsiata", "dvadsiata prvá", "dvadsiata druhá", "dvadsiata tretia", "dvadsiata štvrtá", "dvadsiata piata", "dvadsiata šiesta", "dvadsiata siedma", "dvadsiata ôsma", "dvadsiata deviata",
                     "tridsiata", "tridsiata prvá"]
          neuter: ["prvé", "druhé", "tretie", "štvrté", "piate", "šieste", "siedme", "ôsme", "deviate", "desiate",
                   "jedenáste", "dvanáste", "trináste", "štrnáste", "pätnáste", "šestnáste", "sedemnáste", "osemnáste", "devätnáste",
                   "dvadsiate", "dvadsiate prvé", "dvadsiate druhé", "dvadsiate tretie", "dvadsiate štvrté", "dvadsiate piate", "dvadsiate šieste", "dvadsiate siedme", "dvadsiate ôsme", "dvadsiate deviate",
                   "tridsiate", "tridsiate prvé"]
        default:
          masculine: ["prvého", "druhého", "tretieho", "štvrtého", "piateho", "šiesteho", "siedmeho", "ôsmeho", "deviateho", "desiateho",
                      "jedenásteho", "dvanásteho", "trinásteho", "štrnásteho", "pätnásteho", "šestnásteho", "sedemnásteho", "osemnásteho", "devätnásteho",
                      "dvadsiateho", "dvadsiateho prvého", "dvadsiateho druhého", "dvadsiateho tretieho", "dvadsiateho štvrtého", "dvadsiateho piateho", "dvadsiateho šiesteho", "dvadsiateho siedmeho", "dvadsiateho ôsmeho", "dvadsiateho deviateho",
                      "tridsiateho", "tridsiateho prvého"]

    datetime:
      template: "%{date}, %{time}"
    date:
      template:
        default: "%{day} %{month} %{year}"
        nominative: "%{day} %{month} %{year}"
      months:
        default: ["januára", "februára", "marca", "apríla", "mája", "júna", "júla", "augusta", "septembra", "októbra", "novembra", "decembra"]
        nominative: ["január", "február", "marec", "apríl", "máj", "jún", "júl", "august", "september", "október", "november", "december"]
    time:
      template:
        hours_only: "%{hours}"
        hours_minutes: "%{hours} %{minutes}"
        hours_minutes_seconds: "%{hours} %{minutes} %{seconds}"
      words:
        hour: ["hodina", "hodiny", "hodín"]
        minute: ["minúta", "minúty", "minút"]
        second: ["sekunda", "sekundy", "sekúnd"]

    warnings:
      currency_not_available: "Mena %{currency} nie je dostupná pre jazyk %{lang}, používa sa aktuálna."

